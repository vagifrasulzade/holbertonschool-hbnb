<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Review – HBNB</title>
  <link rel="icon" href="{{ url_for('static', filename='images/icon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>

  <header class="site-header">
    <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo" alt="HBNB Logo">
    <nav class="nav">
      <a href="{{ url_for('place_details', place_id=place_id) }}">&#8592; Back to Place</a>
      <a href="{{ url_for('home') }}">Home</a>
    </nav>
  </header>

  <div class="form-wrapper">
    <form id="review-form" class="form" data-place-id="{{ place_id }}">
      <h1>Leave a Review</h1>
      <p class="form-subtitle muted">Place: <strong>{{ place_id }}</strong></p>

      <label for="review">Your experience</label>
      <textarea id="review" name="review" rows="5" placeholder="Tell others what you liked…" required></textarea>

      <label for="rating">Rating</label>
      <select id="rating" name="rating" required>
        <option value="">Choose a rating…</option>
        <option value="1">&#11088; 1 – Poor</option>
        <option value="2">&#11088;&#11088; 2 – Fair</option>
        <option value="3">&#11088;&#11088;&#11088; 3 – Good</option>
        <option value="4">&#11088;&#11088;&#11088;&#11088; 4 – Very Good</option>
        <option value="5">&#11088;&#11088;&#11088;&#11088;&#11088; 5 – Excellent</option>
      </select>

      <button type="submit" class="details-button">Submit Review</button>

      <p id="review-error" class="form-error" aria-live="polite"></p>
    </form>
  </div>

  <footer class="site-footer">
    <p>All rights reserved &copy; 2024 HBNB</p>
  </footer>

  <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
