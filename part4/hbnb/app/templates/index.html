<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HBNB – Find Your Place</title>
  <link rel="icon" href="{{ url_for('static', filename='images/icon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

  <header class="site-header">
    <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo" alt="HBNB Logo">
    <nav class="nav">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('login') }}" class="login-button">Login</a>
    </nav>
  </header>

  <main class="container">

    <div class="hero">
      <h1>Find Your Perfect Place</h1>
      <p>Discover unique stays, handpicked just for you.</p>
    </div>

    <section id="filter" class="filter">
      <label for="price-filter">&#128178; Max Price:</label>
      <select id="price-filter" aria-label="Max price filter">
        <option value="all">All prices</option>
        <option value="100">Up to $100</option>
        <option value="150">Up to $150</option>
        <option value="200">Up to $200</option>
      </select>
    </section>

    <section id="places-list" class="places-list" aria-label="Places list">
      <!-- populated by JS -->
    </section>

  </main>

  <footer class="site-footer">
    <p>All rights reserved &copy; 2024 HBNB</p>
  </footer>

  <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
