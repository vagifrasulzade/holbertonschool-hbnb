<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – HBNB</title>
  <link rel="icon" href="{{ url_for('static', filename='images/icon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>

  <header class="site-header">
    <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo" alt="HBNB Logo">
    <nav class="nav">
      <a href="{{ url_for('home') }}">Home</a>
    </nav>
  </header>

  <div class="form-wrapper">
    <form id="login-form" class="form" novalidate>
      <h1>Welcome back</h1>
      <p class="form-subtitle">Sign in to your HBNB account.</p>

      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">

      <button type="submit" class="details-button">Sign in</button>

      <p id="login-error" class="form-error" aria-live="polite"></p>
    </form>
  </div>

  <footer class="site-footer">
    <p>All rights reserved &copy; 2024 HBNB</p>
  </footer>

  <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
